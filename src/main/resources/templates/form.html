<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Input</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="glass-container" style="max-width: 500px;">
    <h2>Input Mahasiswa Baru</h2>
    <form th:action="@{/save}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Nama Lengkap:</label>
            <input type="text" th:field="*{nama}" placeholder="Contoh: Budi" required>
        </div>
        <div class="form-group">
            <label>NIM:</label>
            <input type="text" th:field="*{nim}" placeholder="Contoh: 2021..." required>
        </div>
        <div class="form-group">
            <label>Jenis Kelamin:</label><br>
            <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki"> Laki-laki
            <input type="radio" th:field="*{jenisKelamin}" value="Perempuan"> Perempuan
        </div>
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn" style="flex: 2;">Simpan Data</button>
            <a th:href="@{/home}" class="btn" style="background: #636e72; flex: 1;">Batal</a>
        </div>
    </form>
</div>
</body>
</html>
